name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  BINARY_NAME: agent

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        goarch: [amd64]
        include:
          - os: ubuntu-latest
            goarch: arm64
          - os: macos-latest
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get dependencies
        run: go mod download

      - name: Build
        if: matrix.os != 'windows-latest'
        env:
          GOOS: ${{ matrix.os == 'ubuntu-latest' && 'linux' || 'darwin' }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          OS_NAME=$(echo $GOOS | tr '[:lower:]' '[:upper:]')
          OUTPUT_NAME="${{ env.BINARY_NAME }}-${OS_NAME}-${GOARCH}"
          mkdir -p bin
          go build -ldflags "-s -w -X 'main.version=$VERSION' -X 'main.commit=$COMMIT'" -o "bin/${OUTPUT_NAME}" ./cmd/agent
          echo "OUTPUT_NAME=$OUTPUT_NAME" >> $GITHUB_ENV

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          OUTPUT_NAME="${{ env.BINARY_NAME }}-WINDOWS-${GOARCH}.exe"
          mkdir -p bin
          go build -ldflags "-s -w -X 'main.version=$VERSION' -X 'main.commit=$COMMIT'" -o "bin/${OUTPUT_NAME}" ./cmd/agent
          echo "OUTPUT_NAME=$OUTPUT_NAME" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.goarch }}
          path: bin/${{ env.OUTPUT_NAME }}
          retention-days: 30

  upload-to-oss:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup OSSUTIL
        run: |
          wget https://gosspublic.alicdn.com/ossutil/ossutil-cn-hangzhou.zip -O ossutil.zip
          unzip -q ossutil.zip -d /tmp
          chmod +x /tmp/ossutil
          echo "/tmp" >> $GITHUB_PATH

      - name: Configure OSSUTIL
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          /tmp/ossutil config \
            --endpoint=$OSS_ENDPOINT \
            --access-key-id=$OSS_ACCESS_KEY_ID \
            --access-key-secret=$OSS_ACCESS_KEY_SECRET \
            --bucket=$OSS_BUCKET

      - name: Upload to OSS
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          VERSION: ${{ github.ref_name }}
        run: |
          TAG_NAME=${VERSION#v}
          OSS_PATH="devops/agent/${TAG_NAME}/"
          
          for dir in artifacts/*/; do
            for file in "$dir"*/; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                echo "Uploading $filename to oss://${OSS_BUCKET}/${OSS_PATH}${filename}"
                /tmp/ossutil cp "$file" "oss://${OSS_BUCKET}/${OSS_PATH}${filename}"
              fi
            done
          done
          
          # Upload checksums file
          cd artifacts
          find . -type f -name "agent*" | while read f; do
            sha256sum "$f" >> checksums.txt
          done
          /tmp/ossutil cp checksums.txt "oss://${OSS_BUCKET}/${OSS_PATH}checksums.txt"

      - name: List OSS files
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          VERSION: ${{ github.ref_name }}
        run: |
          TAG_NAME=${VERSION#v}
          /tmp/ossutil ls "oss://${OSS_BUCKET}/devops-agent/${TAG_NAME}/"
